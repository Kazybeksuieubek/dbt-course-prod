version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw hiring analytics data ingested from the source system."

    tables:
      # FAIL: error_after 7 days, data is ~458 days old → ERROR
      - name: candidates
        description: "Candidate profiles with availability status, skill, and job preferences."
        loaded_at_field: _updated_micros
        freshness:
          error_after: {count: 7, period: day}
        columns:
          - name: _offset
            description: "Incremental load offset."
            data_tests:
              - not_null
              # DQ Issue: CDC replay can produce duplicate offsets in the source;
              # deduplication is applied in staging via QUALIFY ROW_NUMBER()
              - unique:
                  severity: warn
          - name: candidate_id
            description: "Unique identifier for the candidate."
            data_tests:
              - not_null
          - name: primary_skill_id
            description: "Foreign key to the candidate's primary skill."
          - name: staffing_status
            description: "Current availability status (e.g., Available, On Project)."
          - name: english_level
            description: "English proficiency level (e.g., C1, B2, Unspecified)."
          - name: job_function_id
            description: "Foreign key to the candidate's desired job function."
          - name: _created_micros
            description: "Record creation timestamp in Unix microseconds."
            data_tests:
              - not_null
          - name: _updated_micros
            description: "Record last-update timestamp in Unix microseconds."
            data_tests:
              - not_null

      # WARN: warn_after 100 days, error_after 600 days; data is ~458 days old → WARN
      - name: interviews
        description: "Interview records including participants, status, type, and media details."
        loaded_at_field: _updated_micros
        freshness:
          warn_after:  {count: 100, period: day}
          error_after: {count: 600, period: day}
        columns:
          - name: _offset
            description: "Incremental load offset."
            data_tests:
              - not_null
              # DQ Issue: CDC replay can produce duplicate offsets; deduped in staging
              - unique:
                  severity: warn
          - name: id
            description: "Unique identifier for the interview event."
            data_tests:
              - not_null
          - name: candidate_type
            description: "Category of the interviewee (e.g., Applicant)."
          - name: candidate_id
            description: "Foreign key to the candidate being interviewed."
            data_tests:
              - not_null
              # DQ Issue: some interviews reference candidates not present in the candidates table
              - relationships:
                  to: source('raw', 'candidates')
                  field: candidate_id
                  severity: warn
          - name: status
            description: "Interview lifecycle status (DRAFT, REQUESTED, COMPLETED, etc.)."
            data_tests:
              - not_null
          - name: interviewer_id
            description: "Foreign key to the interviewer."
            data_tests:
              # DQ Issue: some interviews reference employees not present in the employees table
              - relationships:
                  to: source('raw', 'employees')
                  field: employee_id
                  severity: warn
          - name: location
            description: "Interview platform or physical location (e.g., MS_TEAMS)."
          - name: logged
            description: "Whether the interview session was logged."
          - name: media_available
            description: "Whether a media recording exists."
          - name: run_type
            description: "Delivery mode of the interview (e.g., ONLINE, ONSITE)."
          - name: type
            description: "Interview type (e.g., Technical, HR)."
          - name: media_status
            description: "Recording status (e.g., NO_MEDIA, AVAILABLE)."
          - name: invite_answer_status
            description: "Whether the candidate accepted or declined the invite."
          - name: _created_micros
            description: "Record creation timestamp in Unix microseconds."
            data_tests:
              - not_null
          - name: _updated_micros
            description: "Record last-update timestamp in Unix microseconds."
            data_tests:
              - not_null

      # PASS: warn_after 600 days; data is ~458 days old → PASS
      - name: skills
        description: "Skills taxonomy with hierarchy, type, and activity flags."
        loaded_at_field: _updated_micros
        freshness:
          warn_after: {count: 600, period: day}
        columns:
          - name: _offset
            description: "Incremental load offset."
            data_tests:
              - not_null
              # DQ Issue: CDC replay can produce duplicate offsets; deduped in staging
              - unique:
                  severity: warn
          - name: id
            description: "Unique identifier for the skill."
            data_tests:
              - not_null
          - name: is_active
            description: "Whether the skill is currently active in the taxonomy."
          - name: is_primary
            description: "Whether this skill can be used as a primary skill."
          - name: is_key
            description: "Whether this is a key/critical skill."
          - name: is_key_reason
            description: "Reason the skill is flagged as key."
          - name: type
            description: "Skill classification type (e.g., Skill, Technology)."
          - name: name
            description: "Display name of the skill."
            data_tests:
              # DQ Issue: 8 source rows have null name; filtered out in stg_skill
              - not_null:
                  severity: warn
          - name: url
            description: "Reference or documentation URL for the skill."
          - name: parent_id
            description: "Foreign key to the parent node in the skill hierarchy."
          - name: _created_micros
            description: "Record creation timestamp in Unix microseconds."
            data_tests:
              - not_null
          - name: _updated_micros
            description: "Record last-update timestamp in Unix microseconds."
            data_tests:
              - not_null

      - name: employees
        description: "Employee records with employment type, organisational placement, and tenure dates."
        loaded_at_field: _updated_micros
        columns:
          - name: _offset
            description: "Incremental load offset."
            data_tests:
              - not_null
              # DQ Issue: CDC replay can produce duplicate offsets; deduped in staging
              - unique:
                  severity: warn
          - name: employee_id
            description: "Unique identifier for the employee."
            data_tests:
              # DQ Issue: 4 source rows have null employee_id; filtered out in stg_employee
              - not_null:
                  severity: warn
          - name: job_function_id
            description: "Foreign key to the employee's job function."
          - name: primary_skill_id
            description: "Foreign key to the employee's primary skill."
          - name: production_category
            description: "Whether the employee is in Production or Non-Production."
          - name: employment_status
            description: "Employment type (e.g., Full-time employee, Contractor)."
          - name: org_category
            description: "High-level organisational category."
          - name: org_category_type
            description: "Sub-type of the organisational category."
          - name: work_start_micros
            description: "Employment start date in Unix microseconds."
          - name: work_end_micros
            description: "Employment end date in Unix microseconds; empty if still active."
          - name: is_active
            description: "Whether the employee is currently active."
            data_tests:
              - not_null
          - name: _created_micros
            description: "Record creation timestamp in Unix microseconds."
            data_tests:
              - not_null
          - name: _updated_micros
            description: "Record last-update timestamp in Unix microseconds."
            data_tests:
              - not_null

      - name: job_functions
        description: "Job function definitions including seniority levels, tracks, and categories."
        loaded_at_field: _updated_micros
        columns:
          - name: _offset
            description: "Incremental load offset."
            data_tests:
              - not_null
              # DQ Issue: CDC replay can produce duplicate offsets; deduped in staging
              - unique:
                  severity: warn
          - name: job_function_id
            description: "Unique identifier for the job function."
            data_tests:
              - not_null
          - name: base_name
            description: "Base name of the job function (e.g., Testing, Business Analysis)."
            data_tests:
              - not_null
          - name: category
            description: "Functional category (e.g., Delivery, Other)."
          - name: is_active
            description: "Whether the job function is currently active."
            data_tests:
              - not_null
          - name: level
            description: "Numeric seniority level."
          - name: track
            description: "Career track code (e.g., A for Advisory, O for Other)."
          - name: seniority_level
            description: "Full seniority level code (e.g., A4, O3)."
          - name: seniority_index
            description: "Numeric index used for seniority sorting."
          - name: _created_micros
            description: "Record creation timestamp in Unix microseconds."
            data_tests:
              - not_null
          - name: _updated_micros
            description: "Record last-update timestamp in Unix microseconds."
            data_tests:
              - not_null
