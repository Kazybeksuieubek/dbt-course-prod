version: 2

models:
  - name: stg_candidate
    description: "Full SCD2 history of each candidate with renamed columns and timestamp casts."
    config:
      materialized: view
    columns:
      - name: offset
        description: "Incremental load offset from the source system. Unique per version row."
        data_tests:
          - unique
          - not_null
      - name: id
        description: "Unique candidate identifier."
        data_tests:
          - not_null
      - name: primary_skill_id
        description: "Foreign key to the candidate's primary skill."
      - name: staffing_status
        description: "Current staffing availability status."
      - name: english_level
        description: "English proficiency level."
      - name: job_function_id
        description: "Foreign key to the desired job function."
      - name: created_at
        description: "Record creation timestamp (converted from Unix microseconds)."
        data_tests:
          - not_null
      - name: updated_at
        description: "Record last-update timestamp (converted from Unix microseconds)."
        data_tests:
          - not_null
      - name: row_valid_from
        description: "SCD2 validity start (Unix microseconds from source)."
        data_tests:
          - not_null
      - name: row_valid_to
        description: "SCD2 validity end (Unix microseconds; sentinel 9558613439000000 = active)."
        data_tests:
          - not_null
      - name: row_is_active
        description: "1 if this is the current version of the record, 0 otherwise."
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]

  - name: stg_employee
    description: "Full SCD2 history of each employee with type casts and date conversions."
    config:
      materialized: table
    columns:
      - name: offset
        description: "Incremental load offset from the source system. Unique per version row."
        data_tests:
          - unique
          - not_null
      - name: id
        description: "Unique employee identifier."
        data_tests:
          - not_null
      - name: job_function_id
        description: "Foreign key to the employee's job function."
      - name: primary_skill_id
        description: "Foreign key to the employee's primary skill."
      - name: production_category
        description: "Production or Non-Production classification."
      - name: employment_status
        description: "Employment type (Full-time, Contractor, etc.)."
      - name: org_category
        description: "High-level organisational category."
      - name: org_category_type
        description: "Sub-type of the organisational category."
      - name: work_start_date
        description: "Employment start date."
      - name: work_end_date
        description: "Employment end date; NULL if still active."
      - name: is_active
        description: "Whether the employee is currently active."
        data_tests:
          - not_null
      - name: created_at
        description: "Record creation timestamp."
        data_tests:
          - not_null
      - name: updated_at
        description: "Record last-update timestamp."
        data_tests:
          - not_null
      - name: row_valid_from
        description: "SCD2 validity start (Unix microseconds from source)."
        data_tests:
          - not_null
      - name: row_valid_to
        description: "SCD2 validity end (Unix microseconds; sentinel 9558613439000000 = active)."
        data_tests:
          - not_null
      - name: row_is_active
        description: "1 if this is the current version of the record, 0 otherwise."
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]

  - name: stg_interview
    description: >
      Full SCD2 history of interview records. Each row represents one status-change event.
      Materialized incrementally so only new or updated records are processed on each run.
    config:
      materialized: incremental
      unique_key: offset
    columns:
      - name: offset
        description: "Incremental load offset from the source system. Unique per version row."
        data_tests:
          - unique
          - not_null
      - name: id
        description: "Unique interview identifier."
        data_tests:
          - not_null
      - name: candidate_type
        description: "Category of the interviewee."
      - name: candidate_id
        description: "Foreign key to the candidate."
        data_tests:
          - not_null
      - name: status
        description: "Normalised interview lifecycle status (no leading/trailing underscores)."
        data_tests:
          - not_null
          # DQ Issue 1: source contains dirty values like __CANCELLED and COMPLETED__
          # Fixed via REGEXP_REPLACE in the staging_column_config seed custom_expression;
          # this test confirms the normalisation holds after staging.
          - dbt_expectations.expect_column_values_to_not_match_regex:
              regex: "^_|_$"
      - name: interviewer_id
        description: "Foreign key to the interviewer."
      - name: location
        description: "Platform or location (e.g. MS_TEAMS)."
      - name: is_logged
        description: "Whether the session was logged."
      - name: is_media_available
        description: "Whether a recording exists."
      - name: run_type
        description: "Delivery mode (ONLINE, ONSITE)."
        data_tests:
          - accepted_values:
              values: ['ONLINE', 'ONSITE', 'MIXED']
              severity: warn
      - name: type
        description: "Interview type (Technical, HR, etc.)."
        data_tests:
          - not_null
      - name: media_status
        description: "Recording status."
      - name: invite_answer_status
        description: "Whether the candidate accepted or declined the invite."
      - name: created_at
        description: "Record creation timestamp."
        data_tests:
          - not_null
      - name: updated_at
        description: "Record last-update timestamp."
        data_tests:
          - not_null
      - name: row_valid_from
        description: "SCD2 validity start (Unix microseconds from source)."
        data_tests:
          - not_null
      - name: row_valid_to
        description: "SCD2 validity end (Unix microseconds; sentinel 9558613439000000 = active)."
        data_tests:
          - not_null
      - name: row_is_active
        description: "1 if this is the current version of the record, 0 otherwise."
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]

  - name: stg_skill
    description: "Full SCD2 history of each skill with boolean flags and timestamp casts."
    config:
      materialized: view
    columns:
      - name: offset
        description: "Incremental load offset from the source system. Unique per version row."
        data_tests:
          - unique
          - not_null
      - name: id
        description: "Unique skill identifier."
        data_tests:
          - not_null
      - name: is_active
        description: "Whether the skill is active in the taxonomy."
      - name: is_primary
        description: "Whether the skill can serve as a primary skill."
      - name: is_key
        description: "Whether this is a key/critical skill."
      - name: is_key_reason
        description: "True when a key-reason text is present in the source."
      - name: type
        description: "Skill classification type."
      - name: name
        description: "Display name of the skill."
        data_tests:
          - not_null
      - name: url
        description: "Reference URL for the skill."
      - name: parent_id
        description: "Foreign key to the parent skill in the hierarchy."
      - name: created_at
        description: "Record creation timestamp."
        data_tests:
          - not_null
      - name: updated_at
        description: "Record last-update timestamp."
        data_tests:
          - not_null
      - name: row_valid_from
        description: "SCD2 validity start (Unix microseconds from source)."
        data_tests:
          - not_null
      - name: row_valid_to
        description: "SCD2 validity end (Unix microseconds; sentinel 9558613439000000 = active)."
        data_tests:
          - not_null
      - name: row_is_active
        description: "1 if this is the current version of the record, 0 otherwise."
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]

  - name: stg_job_function
    description: "Full SCD2 history of each job function with seniority attributes and timestamp casts."
    config:
      materialized: view
    columns:
      - name: offset
        description: "Incremental load offset from the source system. Unique per version row."
        data_tests:
          - unique
          - not_null
      - name: id
        description: "Unique job function identifier."
        data_tests:
          - not_null
      - name: base_name
        description: "Base name of the job function."
        data_tests:
          - not_null
      - name: category
        description: "Functional category (Delivery, Other, etc.)."
      - name: is_active
        description: "Whether the job function is active."
        data_tests:
          - not_null
      - name: level
        description: "Numeric seniority level."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 10
              severity: warn
      - name: track
        description: "Career track code."
      - name: seniority_level
        description: "Full seniority level code (e.g. A4, O3)."
      - name: seniority_index
        description: "Numeric index for seniority sorting."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
              severity: warn
      - name: created_at
        description: "Record creation timestamp."
        data_tests:
          - not_null
      - name: updated_at
        description: "Record last-update timestamp."
        data_tests:
          - not_null
      - name: row_valid_from
        description: "SCD2 validity start (Unix microseconds from source)."
        data_tests:
          - not_null
      - name: row_valid_to
        description: "SCD2 validity end (Unix microseconds; sentinel 9558613439000000 = active)."
        data_tests:
          - not_null
      - name: row_is_active
        description: "1 if this is the current version of the record, 0 otherwise."
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]

  - name: stg_date
    description: "Date dimension spanning 2020–2029 with calendar attributes."
    config:
      materialized: table
    columns:
      - name: date
        description: "Calendar date (primary key)."
        data_tests:
          - unique
          - not_null
      - name: year
        description: "Calendar year."
      - name: quarter
        description: "Calendar quarter (1–4)."
      - name: month
        description: "Month number (1–12)."
      - name: day
        description: "Day of month (1–31)."
      - name: week
        description: "ISO week of year."
      - name: day_of_week
        description: "Day of week (0=Sunday … 6=Saturday)."
      - name: day_name
        description: "Abbreviated day name (Mon, Tue, …)."
      - name: month_name
        description: "Abbreviated month name (Jan, Feb, …)."
      - name: is_weekend
        description: "True for Saturday and Sunday."
      - name: is_holiday
        description: "Public holiday flag (currently always false — no calendar source)."

  - name: latest_stg_candidate
    description: "Current state of each candidate (row_is_active = 1)."
    columns:
      - name: id
        data_tests:
          - unique
          - not_null

  - name: latest_stg_employee
    description: "Current state of each employee (row_is_active = 1)."
    columns:
      - name: id
        data_tests:
          - unique
          - not_null

  - name: latest_stg_interview
    description: "Current state of each interview (row_is_active = 1)."
    columns:
      - name: id
        data_tests:
          - unique
          - not_null

  - name: latest_stg_skill
    description: "Current state of each skill (row_is_active = 1)."
    columns:
      - name: id
        data_tests:
          - unique
          - not_null

  - name: latest_stg_job_function
    description: "Current state of each job function (row_is_active = 1)."
    columns:
      - name: id
        data_tests:
          - unique
          - not_null
