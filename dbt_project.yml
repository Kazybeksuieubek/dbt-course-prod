# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'hiring_analytics'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'hiring_analytics'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
# Course CSV seeds live under `data/` (do not use `raw` as your dev schema in profiles.yml)
seed-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Add new time traps here without touching interview_time_trap.sql.
  # trap_type: within_interview  → duration between two statuses of the same interview
  # trap_type: between_interviews → duration from one interview type's status
  #                                  to the next interview type's creation (same candidate)
  interview_time_traps:
    - name: scheduled_to_started
      trap_type: within_interview
      start_status: SCHEDULED
      end_status: IN_PROGRESS

    - name: started_to_pending_feedback
      trap_type: within_interview
      start_status: IN_PROGRESS
      end_status: PENDING_FEEDBACK

    - name: pending_feedback_to_completed
      trap_type: within_interview
      start_status: PENDING_FEEDBACK
      end_status: COMPLETED

    - name: GI_completed_to_TI_created
      trap_type: between_interviews
      start_interview_type: General
      start_status: COMPLETED
      end_interview_type: Technical

models:
  hiring_analytics:
    # Starter example models
    example:
      +materialized: view
    # Recommended layout for Hiring Analytics (add models as you build)
    staging:
      +materialized: view
    marts:
      +materialized: table
